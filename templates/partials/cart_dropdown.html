{% load static %}
<div class="header-cart header-dropdown">
  <ul class="header-cart-wrapitem">
    {% for oi in items %}
    <li class="header-cart-item">
      <div class="header-cart-item-img">
        <img src="{{ oi.item.image.url }}" alt="IMG" />
      </div>
      <div class="header-cart-item-txt">
        <a href="{{ oi.item.get_absolute_url }}" class="header-cart-item-name"
          >{{ oi.item.title }}</a
        >
        <span class="header-cart-item-info"
          >{{ oi.quantity }} x ${{ oi.get_final_price|floatformat:2 }}</span
        >
      </div>
    </li>
    {% empty %}
    <li class="header-cart-item">
      <div class="header-cart-item-txt">Your cart is empty</div>
    </li>
    {% endfor %}
  </ul>
  <div class="header-cart-total">Total: ${{ total|floatformat:2 }}</div>
  <div class="header-cart-buttons">
    <div class="header-cart-wrapbtn">
      <a
        href="{% url 'core:order-summary' %}"
        class="flex-c-m size1 bg1 bo-rad-20"
        >View Cart</a
      >
    </div>
    <div class="header-cart-wrapbtn">
      <a href="#" class="flex-c-m size1 bg1 bo-rad-20">Checkout</a>
    </div>
  </div>
</div>
